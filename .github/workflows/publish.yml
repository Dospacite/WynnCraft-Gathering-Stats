name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify release tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match mod_version=${VERSION}." >&2
            exit 1
          fi

      - name: Build and test
        run: ./gradlew clean build

      - name: Publish release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          name: WynnCraft Gathering Stats ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: fabric
          game-versions: 1.21.11
          java: 21
          modrinth-dependencies: wynntils@4.2.2(required)
          curseforge-dependencies: wynntils(required)
